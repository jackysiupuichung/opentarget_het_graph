# TODO: consider resource score or score for downstream process
# are there duplicate evidences where source and target and relation are the same?

# for each edge, we log the properties evidence_id (id), score, year for temporal tracing back to evidence

sourceId=cancer_biomarkers:
  source: targetId
  target: diseaseId
  relation: datatypeId
  props: [datasourceId, score, year, id]

# chembl_drug_disease.yaml
sourceId=chembl:
  - source: drugId
    target: diseaseId
    relation_name: clinical_trial
    props: [datasourceId, score, year, id]

  - source: drugId
    target: targetId
    relation_name: modulated_by
    props: [datasourceId, score, year, id]

# provide direct and mechanistic edge for pathway related
sourceId=reactome:
  - source: targetId
    target: diseaseId
    relation: datatypeId
    props: [datasourceId, score, year, id]
    
  - source: targetId
    target: pathways.id
    relation_name: involved_in
    props: [datasourceId, score, year, id]

  - source: diseaseId
    target: pathways.id
    relation: datatypeId
    relation_name: associated_with
    props: [datasourceId, score, year, id]

