experiment:
  name: advancement_lambdarank_recency

data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/graph/hetero_graph_with_features_datatype_w3.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/progression/temporal_graph_datatype_w3_mappings.pt

model:
  name: hgt
  hidden_dim: 32
  num_heads: 1
  num_layers: 2
  dropout: 0.2
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0, 1]
  edge_feat_dim: 2
  use_recency: true
  time_dim: 8

train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/26.03/runs/advancement_lambdarank_recency
  num_epochs: 50
  lr: 0.0002880497839949814
  weight_decay: 2.141361368779832e-05
  eta_min: 1.0e-6
  batch_size: 512
  num_neighbors: [30, 20]
  lambdarank:
    sigma: 1.0
    ndcg_k: 100
  early_stopping:
    enabled: true
    patience: 10
    metric: ndcg_ta_mean@30
