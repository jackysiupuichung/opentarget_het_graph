  lr: 0.0009511974905423232
  weight_decay: 0.0011653823378934012
  eta_min: 1.0e-6
  cosine_t_max: 40
  batch_size: 256
  num_neighbors: [30, 20]
  eval_every: 1
  lambdarank:
    impl: allrank_grouped
    weighing_scheme: lambdaRank_scheme
    sigma: 1.4319388789983414
    ndcg_k: 100
    group_all_tas: true
  early_stopping:
    enabled: false
    patience: 999
    metric: rs_ta_median@50
    mode: max
seed: 1
eval:
  prospective:
    diseases: []
    cutoff_year: 2015
    ks: [100]
