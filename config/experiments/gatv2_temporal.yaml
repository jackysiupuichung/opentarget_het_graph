# GATv2 Temporal Snapshot Benchmark (PLACEHOLDER)
# This model uses a sequence of snapshots and a Causal Attention Wrapper.
# Currently disabled in the codebase due to full-graph memory requirements.

experiment_name: "gatv2_temporal"

data:
  temporal_graph_file: "output/progression/temporal_graph.pt"
  temporal_split:
    train_year: 2016
    val_year: 2017
    test_year: 2025
  graph:
    mode: "temporal_snapshot"
    supervision:
      src_type: "disease"
      relation: "clinical_trial::chembl"
      dst_type: "target"

model:
  name: "gatv2_temporal"
  window_size: 5  # Number of years to look back
  node_features:
    init_method: "random"
    embedding_dim: 128
  hgt:
    hidden_dim: 128
    num_heads: 4
    num_layers: 2
    dropout: 0.1

train:
  batch_size: 512 # Note: Full graph training recommended for this model
  num_epochs: 10
  lr: 0.001
  seed: 42
