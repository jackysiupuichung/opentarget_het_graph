experiment:
  name: event_hgt_pretrain

wandb:
  enabled: false
  project: opentargets-graph
  entity: null

data:
  graph_file: output/graph/hetero_graph_with_features.pt
  mappings_file: output/graph/hetero_mappings.pt
  
  # Unified temporal split for both pretraining and finetuning
  temporal_split:
    train: [null, 2016]
    val: [2017, 2020]
    test: [2021, 2024]

model:
  name: hgt
  hidden_dim: 32
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  use_rte: true  # Enable Relative Temporal Encoding for event-based training

# Self-supervised pretraining configuration
pretrain:
  output_dir: runs/event_hgt_pretrain
  batch_size: 512
  num_neighbors: [10, 10]
  neg_sampling_ratio: 1.0
  num_epochs: 100
  lr: 0.001
  weight_decay: 0.0
  
  early_stopping:
    patience: 10

# Clinical task finetuning configuration
finetune:
  output_dir: runs/event_hgt_finetune
  pretrained_checkpoint: runs/event_hgt_pretrain/pretrained_best.pt
  batch_size: 512
  num_neighbors: [10, 10]
  num_epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  
  early_stopping:
    patience: 5
  
  # Clinical trial prediction tasks
  tasks:
    - name: phase_transition
      type: regression
      weight: 1.0
    - name: trial_success
      type: classification
      weight: 1.0

