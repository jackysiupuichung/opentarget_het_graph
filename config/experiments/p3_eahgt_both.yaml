experiment:
  name: p3_eahgt_both

data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true

model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0, 1]
  edge_feat_dim: 2

train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/p3_eahgt_both_lambdarank_v3
  num_epochs: 50
  lr: 0.0004346878320299101
  weight_decay: 0.0018260646941480677
  eta_min: 1.0e-6
  cosine_t_max: 10
  batch_size: 512
  num_neighbors: [20, 10]
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 1.4319388789983414
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 5
    metric: ndcg@50

tune:
  study_name: p3_eahgt_both_tune
  n_trials: 50
  n_jobs: 1
  timeout: null
  pruner: median
  storage: null

  search_space:
    hidden_dim:       [32, 64, 128]
    num_heads:        [1, 2, 4]
    num_layers:       {low: 1, high: 2}
    dropout:          {low: 0.0, high: 0.3, step: 0.05}
    lr: 0.0001
    weight_decay: 0.005
    batch_size:       [256, 512]
    num_neighbors_0:  [10, 20, 30]
    num_neighbors_1:  [5, 10, 20]
    focal_gamma:      [null, 2.0]
