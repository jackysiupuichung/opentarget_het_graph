# GATv3 Time-Agnostic Benchmark
# Collapses the temporal graph into a static graph for training.

experiment_name: "gatv3_agnostic"

data:
  temporal_graph_file: "output/progression/temporal_graph.pt"
  temporal_split:
    train_year: 2016
    val_year: 2017
    test_year: 2025
  graph:
    mode: "time_agnostic"  # COLLAPSE TEMPORAL EDGES
    supervision:
      src_type: "disease"
      relation: "clinical_trial::chembl"
      dst_type: "target"

model:
  name: "gatv3"
  node_features:
    init_method: "random"
    embedding_dim: 128
  hgt:
    hidden_dim: 128
    num_heads: 4
    num_layers: 2
    dropout: 0.1

train:
  batch_size: 512
  num_epochs: 10
  lr: 0.001
  weight_decay: 0.0
  seed: 42
