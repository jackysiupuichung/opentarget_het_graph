experiment:
  name: b7_compgcn_tune

data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/graph/hetero_graph_with_features_datatype_w3.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/progression/temporal_graph_datatype_w3_mappings.pt
  undirected: true

model:
  name: compgcn
  hidden_dim: 128
  num_heads: 1               # unused
  num_layers: 2
  dropout: 0.2
  use_rte: false
  use_edge_features: false
  composition: sub           # base default; sweep overrides via search_space

train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/26.03/runs/b7_compgcn_tune
  num_epochs: 50
  lr: 0.0004346878320299101
  weight_decay: 0.0018260646941480677
  eta_min: 1.0e-6
  cosine_t_max: 10
  batch_size: 512
  num_neighbors: [20, 10]
  lambdarank:
    sigma: 1.4319388789983414
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 5
    metric: ndcg_ta_mean@30

tune:
  study_name: b7_compgcn_tune
  n_trials: 50                        # +10 over R-GCN to cover composition op
  metric: val/ndcg_ta_mean@30

  search_space:
    hidden_dim:       [64, 128, 256]
    num_heads:        [1]                    # unused by CompGCN; pinned
    num_layers:       {low: 1, high: 3}
    dropout:          {low: 0.1, high: 0.5, step: 0.1}

    lr:               {low: 3.0e-5, high: 5.0e-3, log: true}
    weight_decay:     {low: 1.0e-5, high: 1.0e-2, log: true}
    cosine_t_max:     [5, 10, 20]

    batch_size:       [256, 512, 1024]
    num_neighbors_0:  [10, 20, 30]
    num_neighbors_1:  [5, 10, 20]

    sigma:            {low: 0.5, high: 2.0}

    # CompGCN-specific
    composition:      [sub, mult, corr]
