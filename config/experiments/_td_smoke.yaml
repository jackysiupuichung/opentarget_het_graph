experiment:
  name: td_smoke
data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/graph/hetero_graph_with_features_datatype_w3.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/progression/temporal_graph_datatype_w3_mappings.pt
  undirected: false
model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  use_rte: false
  use_edge_features: true
  edge_feat_cols:
  - 0
  - 1
  edge_feat_dim: 2
train:
  output_dir: runs/td_smoke
  num_epochs: 2
  lr: 0.0004346878320299101
  weight_decay: 0.0018260646941480677
  eta_min: 1.0e-06
  cosine_t_max: 10
  batch_size: 256
  num_neighbors:
  - 20
  - 5
  lambdarank:
    impl: allrank
    sigma: 1.4319388789983414
    ndcg_k: 100
  early_stopping:
    enabled: false
    patience: 5
    metric: ndcg_ta_mean@30
discovery:
  split:
    train:
    - null
    - 2012
    val:
    - 2013
    - 2015
    test:
    - 2016
    - null
  neg_ratio: 20
  ks:
  - 100
  - 200
  - 500
  train_diseases:
  - EFO_0003086
  - EFO_0000474
  - EFO_0003884
  - EFO_0003918
  eval_diseases:
  - EFO_0003086
  - EFO_0000474
  - EFO_0003884
  - EFO_0003918
  eval_batch_size: 512
  eval_num_workers: 4
