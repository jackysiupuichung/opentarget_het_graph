experiment:
  name: b3_gatv2

data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/23.06/progression/temporal_graph_datatype_mappings.pt
  undirected: true

# HPs from b3_gatv2_tune sweep (W&B sweep 8e4lgy4b, best trial crisp-sweep-6):
# val ndcg@10=0.931, ndcg@50=0.809, ndcg@100=0.593, rr@10=12.53, rr@100=7.51, AUC=0.425
model:
  name: gatv2
  hidden_dim: 64
  num_heads: 4
  num_layers: 1
  dropout: 0.2
  edge_feat_cols: []
  edge_feat_dim: 0

train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/23.06/runs/b3_gatv2_lambdarank_v2
  num_epochs: 50
  lr: 0.0009511974905423232
  weight_decay: 0.0011653823378934012
  eta_min: 1.0e-6
  cosine_t_max: 10
  batch_size: 1024
  num_neighbors: [30, 20]
  lambdarank:
    impl: allrank
    weighing_scheme: lambdaRank_scheme
    sigma: 0.9399001225095928
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 5
    metric: ndcg@50
