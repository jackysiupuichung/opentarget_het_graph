experiment:
  name: static_hgt

wandb:
  enabled: false
  project: opentarget_benchmark
  entity: null

data:
  graph_file: output/graph/hetero_graph_with_features.pt
  mappings_file: output/graph/hetero_mappings.pt
  # Shared graph definition
  graph:
    supervision:
      src_type: disease
      dst_type: target
      relation: clinical_trial_positive
  
  # Temporal split configuration
  temporal_split:
    train: [null, 2016]
    val: [2017, 2020]
    test: [2021, 2024]

# Shared Encoder Architecture (Backbone)
model:
  name: hgt
  hidden_dim: 32
  num_heads: 2
  num_layers: 2
  dropout: 0.1

pretrain:
  output_dir: runs/static_hgt_pretrain
  num_epochs: 1
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 512
  num_neighbors: [20, 10]
  neg_sampling_ratio: 1.0
  num_workers: 4
  early_stopping:
    enabled: true
    patience: 10

finetune:
  output_dir: runs/static_hgt_finetune
  num_epochs: 2
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  negative_ratio: 15
  early_stopping:
    enabled: true
    patience: 10
  save_predictions: false
  
  # Finetune-Specific Model Params
  model:
    freeze_encoder: true
    pretrained_checkpoint: runs/static_hgt_pretrain/pretrained_best.pt
    decoder:
      hidden_dim: 32
      dropout: 0.1
