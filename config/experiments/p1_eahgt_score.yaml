experiment:
  name: p1_eahgt_score

data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/graph/hetero_graph_with_features_datatype_w3.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/progression/temporal_graph_datatype_w3_mappings.pt
  undirected: true
  # Canonical full-range temporal split: train <=2010, val 2011-2015, test >=2016
  train_cutoff_year: 2010
  val_min_year: 2011
  val_max_year: 2015

model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0]
  edge_feat_dim: 1

train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/26.03/runs/p1_eahgt_score_grouped_ap_v3
  num_epochs: 50
  lr: 0.0004346878320299101
  weight_decay: 0.0018260646941480677
  eta_min: 1.0e-6
  cosine_t_max: 10
  batch_size: 512
  num_neighbors: [20, 10]
  lambdarank:
    impl: allrank_grouped
    weighing_scheme: lambdaRank_scheme
    sigma: 1.4319388789983414
    ndcg_k: 50
  early_stopping:
    enabled: true
    patience: 5
    metric: average_precision

eval:
  prospective:
    diseases: []
    cutoff_year: 2015
    ks: [100, 200, 500]
