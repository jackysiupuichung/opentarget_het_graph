experiment:
  name: abl_score_s2024
data:
  graph_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/graph/hetero_graph_with_features_datatype.pt
  mappings_file: /gpfs/scratch/bty414/opentarget_evidences/26.03/progression/temporal_graph_datatype_mappings.pt
  undirected: true
  random_val_frac: 0.2
  random_seed: 2024
model:
  name: hgt
  hidden_dim: 128
  num_heads: 2
  num_layers: 2
  dropout: 0.1
  decoder_dropout: 0.1
  decoder_kind: mlp
  use_rte: false
  use_edge_features: true
  edge_feat_cols: [0]
  edge_feat_dim: 1
train:
  output_dir: /gpfs/scratch/bty414/opentarget_evidences/26.03/runs/ablation_matched/score/abl_score_s2024
  num_epochs: 40
  lr: 0.0003
  weight_decay: 0.002
  eta_min: 1.0e-6
  cosine_t_max: 40
  batch_size: 256
  num_neighbors: [20, 10]
  eval_every: 1
  lambdarank:
    impl: allrank_grouped
    weighing_scheme: lambdaRank_scheme
    sigma: 1.4319388789983414
    ndcg_k: 100
    group_all_tas: true
  early_stopping:
    enabled: false
    patience: 999
    metric: rs_ta_median@50
    mode: max
seed: 2024
eval:
  prospective:
    diseases: []
    cutoff_year: 2015
    ks: [100]
